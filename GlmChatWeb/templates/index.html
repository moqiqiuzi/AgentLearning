<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlmChat Web</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; }

#sidebar {
    width: 260px; background: #1a1a1a; border-right: 1px solid #2a2a2a;
    display: flex; flex-direction: column; flex-shrink: 0;
}
#sidebar h2 { padding: 16px; font-size: 16px; color: #888; border-bottom: 1px solid #2a2a2a; }
#persona-list { flex: 1; overflow-y: auto; padding: 8px; }
#persona-list .item {
    padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px; font-size: 13px;
}
#persona-list .item:hover { background: #2a2a2a; }
#persona-list .item.active { background: #2d5aa0; color: #fff; }
#persona-list .item .name { font-weight: 600; }
#persona-list .item .tag { color: #666; font-size: 11px; }
#sidebar-bottom { padding: 12px; border-top: 1px solid #2a2a2a; }
#sidebar-bottom label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
#sidebar-bottom select, #sidebar-bottom input[type="range"] {
    width: 100%; background: #2a2a2a; color: #e0e0e0; border: none;
    border-radius: 4px; padding: 6px 8px; font-size: 13px; margin-bottom: 8px;
}
#sidebar-bottom input[type="range"] { padding: 0; height: 6px; -webkit-appearance: none; border-radius: 3px; }

#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#header {
    padding: 12px 20px; border-bottom: 1px solid #2a2a2a;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
#header .title { font-size: 18px; font-weight: 700; }
#header .persona-badge {
    background: #2d5aa0; color: #fff; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
}
#header .actions { margin-left: auto; display: flex; gap: 8px; }
#header .actions button {
    background: #2a2a2a; color: #aaa; border: none; padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-size: 12px;
}
#header .actions button:hover { background: #333; color: #fff; }

#messages {
    flex: 1; overflow-y: auto; padding: 20px; display: flex;
    flex-direction: column; gap: 16px;
}
.msg { max-width: 80%; display: flex; gap: 10px; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
}
.msg.assistant .avatar { background: #2d5aa0; color: #fff; }
.msg.user .avatar { background: #444; color: #fff; }
.msg .bubble {
    padding: 10px 14px; border-radius: 12px; font-size: 14px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word;
}
.msg.assistant .bubble { background: #1e1e1e; border: 1px solid #2a2a2a; }
.msg.user .bubble { background: #2d5aa0; color: #fff; }
.msg .meta { font-size: 11px; color: #555; margin-top: 4px; align-self: flex-end; }
.msg.system .bubble { background: #1a2a1a; border: 1px solid #2a3a2a; color: #8a8; font-size: 13px; }

.typing::after {
    content: "▊"; animation: blink 0.8s infinite;
}
@keyframes blink { 50% { opacity: 0; } }

#input-area {
    padding: 16px 20px; border-top: 1px solid #2a2a2a; flex-shrink: 0;
}
#input-wrap {
    display: flex; gap: 10px; background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 12px; padding: 8px 12px; align-items: flex-end;
}
#input-wrap textarea {
    flex: 1; background: none; color: #e0e0e0; border: none; resize: none;
    font-size: 14px; line-height: 1.5; max-height: 120px; outline: none;
    font-family: inherit;
}
#send-btn {
    background: #2d5aa0; color: #fff; border: none; width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; font-size: 16px; flex-shrink: 0;
}
#send-btn:hover { background: #3670c0; }
#send-btn:disabled { background: #333; cursor: not-allowed; }

#persona-search {
    width: 100%; background: #2a2a2a; color: #e0e0e0; border: none;
    border-radius: 4px; padding: 6px 8px; font-size: 13px; margin-bottom: 8px;
    outline: none;
}
#persona-search::placeholder { color: #555; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
    <h2>🎭 人格列表</h2>
    <input type="text" id="persona-search" placeholder="搜索人格..." />
    <div id="persona-list"></div>
    <div id="sidebar-bottom">
        <label>模型</label>
        <select id="model-select"></select>
        <label>温度: <span id="temp-val">0.1</span></label>
        <input type="range" id="temp-slider" min="0" max="1" step="0.05" value="0.1" />
    </div>
</div>

<div id="main">
    <div id="header">
        <span class="title">GlmChat</span>
        <span class="persona-badge" id="current-persona">智谱小A</span>
        <div class="actions">
            <button onclick="doUndo()">↩ 撤销</button>
            <button onclick="doClear()">🗑 清空</button>
        </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <div id="input-wrap">
            <textarea id="user-input" rows="1" placeholder="输入消息，或 /命令...（Enter 发送，Shift+Enter 换行）"></textarea>
            <button id="send-btn" onclick="sendMessage()">▶</button>
        </div>
    </div>
</div>

<script>
const SID = "web_" + Math.random().toString(36).slice(2, 10);
let personas = {};
let currentPersona = "";
let sending = false;

const msgBox = document.getElementById("messages");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

async function init() {
    const res = await fetch("/api/personas");
    const list = await res.json();
    const container = document.getElementById("persona-list");
    list.forEach(p => {
        personas[p.name] = p;
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.name = p.name;
        div.innerHTML = `<span class="name">${p.name}</span><span class="tag">${p.tag}</span>`;
        div.onclick = () => switchPersona(p.name);
        container.appendChild(div);
    });

    const mres = await fetch("/api/models?sid=" + SID);
    const mdata = await mres.json();
    const sel = document.getElementById("model-select");
    for (const [k, v] of Object.entries(mdata.models)) {
        const opt = document.createElement("option");
        opt.value = k;
        opt.textContent = `${k} - ${v}`;
        if (k === mdata.current) opt.selected = true;
        sel.appendChild(opt);
    }
    sel.onchange = () => {
        fetch("/api/config", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({sid: SID, model: sel.value})
        });
    };

    document.getElementById("temp-slider").oninput = (e) => {
        document.getElementById("temp-val").textContent = e.target.value;
        fetch("/api/config", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({sid: SID, temperature: parseFloat(e.target.value)})
        });
    };

    document.getElementById("persona-search").oninput = (e) => {
        const q = e.target.value.toLowerCase();
        container.querySelectorAll(".item").forEach(el => {
            el.style.display = el.dataset.name.toLowerCase().includes(q) ? "" : "none";
        });
    };

    addSystemMsg("欢迎使用 GlmChat Web！选择左侧人格开始聊天，或输入 /命令 操作。");
}

function switchPersona(name) {
    if (!personas[name]) return;
    currentPersona = name;
    document.getElementById("current-persona").textContent = name;
    document.querySelectorAll("#persona-list .item").forEach(el => {
        el.classList.toggle("active", el.dataset.name === name);
    });
    fetch("/api/config", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sid: SID, persona: name})
    });
    fetch("/api/clear", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sid: SID})
    });
    msgBox.innerHTML = "";
    addSystemMsg(`🎭 已切换为【${name}】模式，对话已清空`);
}

function addMsg(role, text, meta) {
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const avatarText = role === "user" ? "你" : (currentPersona || "A").charAt(0);
    let html = `<div class="avatar">${avatarText}</div><div><div class="bubble">${escapeHtml(text)}</div>`;
    if (meta) html += `<div class="meta">${meta}</div>`;
    html += "</div>";
    div.innerHTML = html;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
    return div;
}

function addSystemMsg(text) {
    const div = document.createElement("div");
    div.className = "msg system";
    div.innerHTML = `<div class="avatar">⚙</div><div><div class="bubble">${text}</div></div>`;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
}

function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    input.value = "";
    input.style.height = "auto";

    if (text.startsWith("/")) {
        addMsg("user", text);
        const res = await fetch("/api/chat", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({sid: SID, prompt: text})
        });
        const data = await res.json();
        addSystemMsg(data.text || JSON.stringify(data));
        sending = false;
        sendBtn.disabled = false;
        input.focus();
        return;
    }

    addMsg("user", text);

    const respDiv = addMsg("assistant", "");
    const bubble = respDiv.querySelector(".bubble");
    bubble.classList.add("typing");
    let fullText = "";

    try {
        const res = await fetch("/api/chat", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({sid: SID, prompt: text})
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        let meta = null;

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buf += decoder.decode(value, {stream: true});

            const lines = buf.split("\n");
            buf = lines.pop();

            for (const line of lines) {
                if (!line.startsWith("data: ")) continue;
                try {
                    const data = JSON.parse(line.slice(6));
                    if (data.error) {
                        bubble.textContent = "❌ " + data.error;
                        break;
                    }
                    if (data.done) {
                        meta = data;
                        break;
                    }
                    if (data.text) {
                        fullText += data.text;
                        bubble.textContent = fullText;
                        msgBox.scrollTop = msgBox.scrollHeight;
                    }
                } catch (e) {}
            }
        }

        bubble.classList.remove("typing");
        if (meta) {
            const parts = [];
            if (meta.first_token) parts.push(`⚡ 首字 ${meta.first_token}s`);
            parts.push(`⏱ ${meta.elapsed}s`);
            if (meta.chars) parts.push(`📝 ${meta.chars}字`);
            const metaDiv = respDiv.querySelector(".meta");
            if (metaDiv) metaDiv.textContent = parts.join("  ");
        }
    } catch (e) {
        bubble.textContent = "❌ 请求失败: " + e.message;
        bubble.classList.remove("typing");
    }

    sending = false;
    sendBtn.disabled = false;
    input.focus();
}

async function doClear() {
    await fetch("/api/clear", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sid: SID})
    });
    msgBox.innerHTML = "";
    addSystemMsg("🗑 对话已清空");
}

async function doUndo() {
    const res = await fetch("/api/undo", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sid: SID})
    });
    const data = await res.json();
    if (data.ok) {
        const msgs = msgBox.querySelectorAll(".msg.user, .msg.assistant");
        if (msgs.length >= 2) {
            msgs[msgs.length - 1].remove();
            msgs[msgs.length - 2].remove();
        }
        addSystemMsg("↩ 已撤销上一轮");
    }
}

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
});

init();
</script>
</body>
</html>
